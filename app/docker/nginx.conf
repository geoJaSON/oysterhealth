# Phase 0 deployment template. Certbot will rewrite the server block once SSL
# is issued; until then this serves the SPA on :80 and proxies /api to the
# backend container.

server {
  listen 80;
  server_name _;

  # API proxy
  location /api/ {
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # SPA
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static asset caching
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
